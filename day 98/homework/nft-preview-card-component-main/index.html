<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="main-container">
    <div class="card">

      <div class="image-block">
        <img class="main-img" src="images/image-equilibrium.jpg" alt="Equilibrium">
      </div>

      <h2 class="title">Equilibrium #3429</h2>

      <p class="description">Our Equilibrium collection promotes balance and calm.</p>

      <div class="info-block">
        <div class="price-box">
          <img src="images/icon-ethereum.svg" alt="ETH">
          0.041 ETH
        </div>
        <div class="time-box">
          <img src="images/icon-clock.svg" alt="Clock">
          3 days left
        </div>
      </div>

      <div class="creator-block">
        <img src="images/image-avatar.png" alt=""  class="avatar">
        <p class="creator-text">
          Creation of <a class="creator-link" href="#">Jules Wyvern</a>
        </p>
      </div>

    </div>
  </div>


  <!-- Equilibrium #3429

  Our Equilibrium collection promotes balance and calm.

  0.041 ETH
  3 days left
  
  Creation of Jules Wyvern -->

</body>

</html>
