<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="task8.css">
</head>
<body>
    <main>
        <!-- font-weight აკონტროლებს ტექსტის სისქეს -->
        <!-- font-weight-ს გადაეცემა სიტყვიერი მნიშვნელობებიც და რიცხვებიც -->

        <!-- სიტყვიერის მაგალითები: normal, bold, bolder, lighter -->
        <p class="p1">normal</p>
        <p class="p2">bold</p>
        <p class="p3">bolder</p>
        <p class="p4">lighter</p>

        <!-- რიცხვების მაგალითები: 100-დან 900-ის ჩათვლით, რაც უფრო მეტია რიცხვი მით უფრო მეტია ტექსტის სისქე -->
        <p id="p1">100</p>
        <p id="p2">200</p>
        <p id="p3">300</p>
        <p id="p4">400</p>
        <p id="p5">500</p>
        <p id="p6">600</p>
        <p id="p7">700</p>
        <p id="p8">800</p>
        <p id="p9">900</p>
    </main>
</body>
</html>
